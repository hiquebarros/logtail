##
## Production Nginx config for logtail / logmole.
##
## Key idea:
## - `domain/api/*` MUST go to the Next.js app (port 3000) so Next "BFF" routes
##   (e.g. `/api/logs`) can normalize backend payloads (data -> items).
## - API subdomains can continue to proxy directly to the backend services.
##

# logmole.pro + www.logmole.pro
server {
  listen 80;
  server_name logmole.pro www.logmole.pro;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl http2;
  server_name logmole.pro www.logmole.pro;

  ssl_certificate /etc/letsencrypt/live/logmole.pro/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/logmole.pro/privkey.pem;

  # Next.js API routes (BFF) - keep `/api/*` on the Next app.
  #
  # IMPORTANT:
  # - Do NOT use a trailing slash in `proxy_pass` here, otherwise nginx will
  #   strip the `/api/` prefix and your upstream will receive `/logs` instead of
  #   `/api/logs`.
  location /api/ {
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Next.js app pages + assets
  location / {
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # If you ever serve WS through this domain, keep upgrade headers.
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
  }
}

# api.logmole.pro
server {
  listen 80;
  server_name api.logmole.pro;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl http2;
  server_name api.logmole.pro;

  ssl_certificate /etc/letsencrypt/live/logmole.pro/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/logmole.pro/privkey.pem;

  location / {
    proxy_pass http://127.0.0.1:3001;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Backend also exposes websockets at `/logs/ws`.
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
  }
}

# ingest.logmole.pro
server {
  listen 80;
  server_name ingest.logmole.pro;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl http2;
  server_name ingest.logmole.pro;

  ssl_certificate /etc/letsencrypt/live/logmole.pro/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/logmole.pro/privkey.pem;

  location / {
    proxy_pass http://127.0.0.1:3002;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}