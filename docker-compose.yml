services:
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: logtail-client
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://server:3001
      NEXT_PUBLIC_ORGANIZATION_ID: 10000000-0000-0000-0000-000000000001
      NEXT_PUBLIC_APPLICATION_ID: 20000000-0000-0000-0000-000000000001
    depends_on:
      - server

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: logtail-server
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: logtail
      DATABASE_URL: postgresql://postgres:postgres@db:5432/logtail?schema=public
    command: sh -c "
      npm run prisma:generate &&
      npx prisma migrate deploy &&
      npm run start
      "
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    container_name: logtail-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: logtail
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d logtail"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
